name: ProjectPulse

options:
  bundleIdPrefix: com.projectpulse
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  ProjectPulse:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: App
      - path: Features
      - path: Domain
      - path: Infrastructure
      - path: Shared
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.veira.app
        PRODUCT_NAME: Veira
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
